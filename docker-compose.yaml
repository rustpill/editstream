services:
  kafka:
    image: confluentinc/cp-kafka:8.1.3
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092 # Docker -> kafka:29092, Host app -> localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT # unencrypted
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false" # we create topics explicitly

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Cluster ID
      CLUISTER_ID: "editstream-local"

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --list --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 10
  
  # Topic init (runs once)
  kafka-init:
    image: confluentinc/cp-kafka:8.1.3
    container_name: kafka-init
    # Wait for kafka health check before running
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating topics...'
 
      kafka-topics --create --if-not-exists  --topic edits  --partitions 1 --replication-factor 1 --config retention.ms=-1 --bootstrap-server kafka:29092
      kafka-topics --describe --topic edits --bootstrap-server kafka:29092
      "
    restart: "no"